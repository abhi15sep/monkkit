name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            APP_DIR=/opt/monkkit
            REPO_DIR=/opt/monkkit/repo

            # Clone or pull latest code
            if [ -d "$REPO_DIR/.git" ]; then
              git -C "$REPO_DIR" fetch origin main
              git -C "$REPO_DIR" reset --hard origin/main
            else
              mkdir -p "$APP_DIR"
              git clone git@github.com:abhi15sep/monkkit.git "$REPO_DIR"
            fi

            # Install deps (needed for prisma CLI + migrate-seed)
            cd "$REPO_DIR"
            npm ci --omit=dev --ignore-scripts 2>/dev/null || npm install --omit=dev --ignore-scripts

            # Run DB migration + seed using project-local Prisma (avoids global version mismatch)
            # host.docker.internal only resolves inside containers; on the host use 127.0.0.1
            export $(grep -v '^#' "$APP_DIR/.env" | xargs)
            HOST_DB_URL=$(echo "$DATABASE_URL" | sed 's/host\.docker\.internal/127.0.0.1/g')
            DATABASE_URL="$HOST_DB_URL" node_modules/.bin/prisma db push --schema prisma/schema.prisma
            DATABASE_URL="$HOST_DB_URL" node docker/migrate-seed.mjs

            # Build new Docker image
            docker build -t monkkit:new "$REPO_DIR" -f "$REPO_DIR/docker/Dockerfile"

            # Swap containers
            docker stop monkkit 2>/dev/null || true
            docker rm monkkit 2>/dev/null || true
            docker run -d \
              --name monkkit \
              -p 3002:3000 \
              --env-file "$APP_DIR/.env" \
              --add-host=host.docker.internal:host-gateway \
              --restart unless-stopped \
              monkkit:new

            # Clean up old images (keep last 2)
            docker images monkkit --format '{{.ID}}' | tail -n +3 | xargs -r docker rmi || true

            echo "Deploy complete."
            docker ps --filter name=monkkit --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
